name: Build, Restore and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # Bước 1: Lấy code từ repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Bước 2: Cài đặt .NET SDK
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      
      # Bước 3: Khôi phục các package NuGet
      - name: Restore dependencies
        run: dotnet restore ./TexifyLab/TexifyLab.slnx
      
      # Bước 4: Build project
      - name: Build project
        run: dotnet build ./TexifyLab/TexifyLab.slnx --configuration Release --no-restore
      
      # Bước 5: Chạy unit tests
      - name: Run unit tests
        run: dotnet test ./TexifyLab/TexifyLab.slnx --configuration Release --no-build --logger trx
      
      # Bước 6: (Tùy chọn) Upload kết quả test để xem sau
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
          retention-days: 7

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore dependencies
        run: dotnet restore ./TexifyLab/TexifyLab.slnx
      
      - name: Pack NuGet package
        run: dotnet pack ./TexifyLab/TexifyLab.slnx --configuration Release --output ./nupkg
      
      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate